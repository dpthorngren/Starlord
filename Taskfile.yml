version: 3


tasks:
  default:
    deps: [test, build_docs]

  devbuild:
    desc: "Rebuild shared library (if cython files have changed) and reinstall."
    deps: [lint]
    run: once
    sources:
      - src/starlord/*.pyx
      - src/starlord/*.pxd
    generates:
      - src/starlord/*.so
    cmds:
      - rm -rf build starlord.egg-info src/starlord/*.so
      - rm -rf build starlord.egg-info src/starlord/*.c
      - rm -rf build starlord.egg-info src/starlord/__pycache__
      - rm -rf docs/build/html/
      - pip uninstall starlord --yes
      - pip install -e .[develop]

  lint:
    desc: "Run flake8 linter"
    run: once
    cmds:
      - flake8 $(git ls-tree -r main --name-only | grep '.*py$') --count --show-source --statistics

  test:
    deps: [lint, devbuild]
    desc: "Run pytest with coverage"
    cmds:
      - pytest --cov=starlord -x

  experiment:
    deps: [devbuild]
    desc: "Build and run experiment.py file for live tests."
    cmds:
      - python experiment.py

  test_docs:
    deps: [devbuild]
    desc: "Run the example TOML files to verify that they all work."
    run: once
    sources:
      - docs/examples/*.toml
    cmds:
      - python docs/examples/demo_grid.py
      - defer: rm -f ~/.config/starlord/grids/demo_grid.npz
      - defer: rm -f example_test_output.npz
      - for: sources
        cmd: starlord {{ .ITEM }} -o example_test_output.npz

  build_docs:
    deps: [devbuild, lint]
    desc: "Build the Starlord documentation with Sphinx."
    sources:
      - src/starlord/*.py
      - src/starlord/*.pyx
      - src/starlord/*.pxd
      - docs/*.rst
      - docs/*/*.rst
      - docs/*/*.py
      - docs/*/*.toml
      - docs/conf.py
    generates:
      - docs/build/html/index.html
    cmds:
      - rm -rf docs/build/html/
      - sphinx-build docs/ docs/build/html/
