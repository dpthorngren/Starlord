[model]
# Likelihood terms (both normal distributions, in this case)
hotJupiters.radius = [1.5, 0.05]
hotJupiters.mass = [0.9, 0.1]

# Fixing the log_flux to a constant
override.hotJupiters.log_flux = "9.2"
# Fixing the heating to a function of flux defined by the grid
override.hotJupiters.heating = "d.hotJupiters.typical_heating"

# Mass and age priors set from observations
prior.log_mass = ['uniform', -0.5, 0.5]
prior.log_age = ['uniform', -1.0, 1.0]
# Uninformative Z_planet prior
prior.zpl = ['uniform', 0.0, 1.0]

# Additional outputs for the sampler to record
# (Mass and age only because the sampler records only their log10 otherwise)
outputs = [
    "d.hotJupiters.mass",
    'd.hotJupiters.age',
    'd.hotJupiters.entropy',
    'd.hotJupiters.tint',
]

[sampling]
sampler="emcee"
emcee_run.progress = true

[output]
terminal=true
file="hotJupiter.npz"
